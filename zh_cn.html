<style>
:root { --primary: #35e149; --bg: #f8fafc; }
body { font-family: system-ui, sans-serif; background: var(--bg); }
.card { box-sizing: border-box; width: 100%; padding: 1.5rem; margin-inline: auto; }

        flex-direction: row;
    }
}
button { background: var(--primary); color: white; text-shadow: 1px 1px 8px #888; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 1; }
button[disabled],
body:has(#disclaimer[open]) #connectBtn,
body:not(.connected) #startBtn,
body:not(.connected) #tcpipBtn,
body.connected #connectBtn { opacity: 0.5; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
button.dim { opacity: 0.8; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; margin-right: 0.5rem; }
body.connected .status-dot { background: #35e149; }
#terminal { position:relative; background: #2f374a; color: #aaa; padding: 1rem; border-radius: 8px; height: 300px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 0.75rem; white-space: pre-wrap; margin-top: 1rem; transition: all .4s ease; }
#terminal:empty { opacity: 0.5;}
#disclaimer { background: rgba(255,255,222,.9); color: #fc0; }
.error { color: red; }
.warn { color: orange; }
.succ { color: var(--primary); }
#terminal .info {color: #aaa;}
#terminal .time {color: gray!important;}
.connected #disclaimer {display: none;}
#cleanBtn { position: absolute; right: 8px; top: 8px; padding: 8px; border-radius: 8px; width: 32px; height: 32px; background: rgba(255,255,255,.2); }
code {outline: 1px dotted currentColor; padding-inline: 4px;}
a {color: var(--primary);}

dialog { position: fixed; z-index: 999; top: 25%; transform: translateY(-50%); width: 85%; max-width: 400px; padding: 0; border-radius: 8px; outline: none; transition: all .3s ease; }
dialog::backdrop { background: rgba(0,0,0,.4); }
dialog .x { position: absolute; top: 2px; right: 2px; width: 44px; height: 44px; font-size: 1.25rem; padding: 0; background: rgba(255,255,255,.1); color: #fc0; outline: none; }
dialog .hd { margin: 0; padding: 0 3rem 0 1rem; height: 48px; line-height: 48px; border-bottom: 1px solid #fc0; }
dialog .title { margin: 0; padding: 0; }
dialog .bd { padding: 1rem; color: #333; }
dialog .ft {padding: 1rem; display: flex; justify-content: flex-end; }
dialog .ft button { max-width: 100px; margin-inline-start: 1rem; }
dialog .btn-confirm { background-color: #fc0; }
dialog .btn-cancel { background-color: #ccc; }
#ft {margin: 2em auto; padding: 1em; text-align: center; font-size: 12px; }
.copyright { color: #999;}
.sepa { color: #ccc; display: inline-block; margin-inline: 1em; }
</style>

        </footer>
    </dialog>
